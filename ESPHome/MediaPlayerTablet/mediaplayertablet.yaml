substitutions:
  device_name: "media-player-tablet"
  device_friendly_name: "Media Player Tablet"

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}
  on_boot:
    then:
      # read the RTC time once when the system boots
      rx8130.read_time:

esp32:
  variant: esp32p4
  engineering_sample: true  # not part of the official m5stack yaml, but without it my esp32-p4 crashed during boot
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret mediaplayertablet_api_key

ota:
  - platform: esphome
    password: !secret mediaplayertablet_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Media Player Tablet"
    password: !secret fallback_password

captive_portal:

psram:
  mode: hex
  speed: 200MHz

i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz
  - id: external_i2c
    sda: GPIO53
    scl: GPIO54

esp_ldo:
  - voltage: 2.5V
    channel: 3

pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
    i2c_id: bsp_bus
    # 0: O - wifi_antenna_int_ext
    # 1: O - speaker_enable
    # 2: O - external_5v_power
    # 3: NC
    # 4: O - lcd reset
    # 5: O - touch panel reset
    # 6: O - camera reset
    # 7: I - headphone detect
  - id: pi4ioe2
    address: 0x44
    i2c_id: bsp_bus
    # 0: O - wifi_power
    # 1: NC
    # 2: NC
    # 3: O - usb_5v_power
    # 4: O - poweroff pulse
    # 5: O - quick charge enable (inverted)
    # 6: I - charging status
    # 7: O - charge enable

i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO29
    i2s_bclk_pin: GPIO27
    i2s_mclk_pin: GPIO30

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: bsp_bus
    bits_per_sample: 16bit
    sample_rate: 16000

audio_dac:
  - platform: es8388
    id: es8388_dac
    i2c_id: bsp_bus

microphone:
  - platform: i2s_audio
    id: tab5_microphone
    i2s_din_pin: GPIO28
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

speaker:
  - platform: i2s_audio
    id: tab5_speaker
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000

display:
  - platform: mipi_dsi
    dimensions:
      height: 1280
      width: 720
    model: M5Stack-Tab5
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
    show_test_card: true

touchscreen:
  - platform: gt911
    id: touch
    i2c_id: bsp_bus
    interrupt_pin: GPIO23
    update_interval: never
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280

output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

  # M5Stack Unit Encoder
  # - platform: m5unit_encoder
  #   m5unit_encoder_id: unit_encoder
  #   led_index: 0
  #   channel: red
  #   id: led0_red
  # - platform: m5unit_encoder
  #   m5unit_encoder_id: unit_encoder
  #   led_index: 0
  #   channel: green
  #   id: led0_green
  # - platform: m5unit_encoder
  #   m5unit_encoder_id: unit_encoder
  #   led_index: 0
  #   channel: blue
  #   id: led0_blue
  # - platform: m5unit_encoder
  #   m5unit_encoder_id: unit_encoder
  #   led_index: 1
  #   channel: red
  #   id: led1_red
  # - platform: m5unit_encoder
  #   m5unit_encoder_id: unit_encoder
  #   led_index: 1
  #   channel: green
  #   id: led1_green
  # - platform: m5unit_encoder
  #   m5unit_encoder_id: unit_encoder
  #   led_index: 1
  #   channel: blue
  #   id: led1_blue

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

  # M5Stack Unit Encoder
  # - platform: rgb
  #   name: "Encoder LED 0"
  #   red: led0_red
  #   green: led0_green
  #   blue: led0_blue
  # - platform: rgb
  #   name: "Encoder LED 1"
  #   red: led1_red
  #   green: led1_green
  #   blue: led1_blue

time:
  - platform: rx8130
    id: rtc_time
    i2c_id: bsp_bus
    # repeated synchronization is not necessary unless the external RTC
    # is much more accurate than the internal clock
    update_interval: never
    timezone: UTC

switch:
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3
  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0
  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2
    restore_mode: ALWAYS_ON

binary_sensor:
  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN

  - platform: gpio
    id: headphone_detect
    name: "Headphone Detect"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7
    trigger_on_initial_state: true
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: headphone_detect
            then:
              - select.set:
                  id: dac_output_select
                  option: "LINE2"
            else:
              - select.set:
                  id: dac_output_select
                  option: "LINE1"

  # M5Stack Unit Scroll
  - platform: m5unit_scroll
    m5unit_scroll_id: unit_scroll
    name: "Unit Scroll Button"
    on_press:
      then:
        - media_player.toggle: local_media_player

  # M5Stack Unit Encoder
  # - platform: m5unit_encoder
  #   m5unit_encoder_id: unit_encoder
  #   name: "Encoder Button"

# The DAC Output select needs to be manually (or with an automation) changed to `LINE1` for the onboard speaker
select:
  - platform: es8388
    dac_output:
      name: DAC Output
      id: dac_output_select
    adc_input_mic:
      name: ADC Input Mic

# A friendlier UI on top of the `wifi_antenna_int_ext` GPIO switch defined in
# config.yaml. Lets the user pick "Internal" / "External" rather than toggling
# a raw on/off switch.
  - platform: template
    id: wifi_antenna_select
    name: "WiFi Antenna"
    options:
      - "Internal"
      - "External"
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: return i == 0;
          then:
            - switch.turn_off: wifi_antenna_int_ext
          else:
            - switch.turn_on: wifi_antenna_int_ext

sensor:
  - platform: ina226
    i2c_id: bsp_bus
    address: 0x41
    adc_averaging: 16
    max_current: 8.192A
    shunt_resistance: 0.005ohm
    bus_voltage:
      id: battery_voltage
      name: "Battery Voltage"
    current:
      id: battery_current
      name: "Battery Current"
      # Positive means discharging
      # Negative means charging

# M5Stack Unit Scroll
  - platform: m5unit_scroll
    name: "Unit Scroll Encoder"
    id: unit_scroll
    i2c_id: external_i2c
    address: 0x40
    update_interval: 50ms
    increment:
      name: "Unit Scroll Increment"

# Tab5 built-in battery discharges from full (8.23 V) to shutdown threshold (6.0 V)
  - platform: template
    name: "Battery Percentage"
    lambda: |-
      float voltage = id(battery_voltage).state;
      // Adjust these values based on your battery's actual min/max voltage
      float min_voltage = 6.0;  // Discharged voltage
      float max_voltage = 8.23;  // Fully charged voltage
      float percentage = (voltage - min_voltage) / (max_voltage - min_voltage) * 100.0;
      if (percentage > 100.0) return 100.0;
      if (percentage < 0.0) return 0.0;
      return percentage;
    update_interval: 60s
    unit_of_measurement: "%"
    accuracy_decimals: 1

# M5Stack unit encoder
#   - platform: m5unit_encoder
#     id: unit_encoder
#     name: "Encoder Value"
#     i2c_id: external_i2c
    
# external_components:
#   - source: github://m5stack/esphome-yaml/components
#     components: [m5unit_encoder]
#     refresh: 0s 

# Media player
media_player:
  - platform: speaker
    name: None
    id: local_media_player
    announcement_pipeline:
      speaker: tab5_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1

# M5Stack RFID reader
rc522_i2c:
  address: 0x28
  i2c_id: external_i2c
  on_tag:
    then:
      - homeassistant.tag_scanned: !lambda 'return x;'

# M5Stack unit scroll
external_components:
  - source:
      type: git
      url: https://github.com/ltextor/HA-tools
      ref: main
      path: ESPHome/MediaPlayerTablet/components
    components: [m5unit_scroll]
