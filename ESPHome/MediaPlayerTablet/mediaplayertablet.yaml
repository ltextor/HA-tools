lvgl:
  byte_order: little_endian
  # rotation: 90
  # buffer_size: 20% # test to fix crashes
  # disp_bg_color: black
  theme:
    dark_mode: true
    # page:
    #   pad_all: 20
    bar:
      bg_color: 0x333333
      bg_opa: COVER
      indicator:
        bg_color: ${highlight_color}
  style_definitions:
    - id: mono_small_style
      text_font: jetbrains_24
      text_color: white
    - id: mono_large_style
      text_font: jetbrains_36
      text_color: white
    # - id: sans_small_style
    #   text_font: manrope_24
    #   text_color: white
    - id: sans_large_style
      text_font: manrope_32
      text_color: white
    - id: icon_small_style
      text_font: material_icons_36
      text_color: white
    - id: icon_medium_style
      text_font: material_icons_48
      text_color: white
    - id: icon_large_style
      text_font: material_icons_60
      text_color: white
    - id: icon_xlarge_style
      text_font: material_icons_250
      text_color: ${highlight_color}
    - id: button_style
      width: 80
      height: 80
      radius: 40
      text_font: material_icons_60
  top_layer:
    # bg_opa: TRANSP
    pad_top: 10
    pad_bottom: 10
    pad_left: 20
    pad_right: 20
    widgets:
      - label:
          id: label_timer
          text: "0:00"
          styles: [mono_small_style]
          align: TOP_LEFT
      - label:
          id: label_wifi_status
          text: "\ue63e" # wifi 3 bar (initial state)
          styles: [icon_small_style]
          align: TOP_RIGHT
          hidden: true
      - label:
          id: label_notconnected
          text: "\ue648" # not connected
          styles: [icon_small_style]
          align: TOP_RIGHT
      - label:
          id: label_battery_status
          text: "\uf302" # battery unknown (initial state, before voltage is read)
          styles: [icon_medium_style]
          align_to:
            id: label_wifi_status
            align: OUT_LEFT_MID
            x: -20
            y: 2
      - label:
          id: label_battery_charging
          text: "\uf305" # battery charging
          styles: [icon_medium_style]
          align_to:
            id: label_wifi_status
            align: OUT_LEFT_MID
            x: -20
            y: 2
          hidden: true
      # ----- VOLUME OVERLAY -----
      - obj:
          id: overlay_volume
          hidden: true
          width: 600
          height: SIZE_CONTENT
          align: CENTER
          bg_opa: 90%
          radius: 20
          pad_all: 25
          widgets:
            - label:
                text: "\ue050" # volume
                styles: [icon_medium_style]
                align: LEFT_MID
            - bar:
                id: bar_volume
                width: 480
                height: 30
                value: 0
                align: RIGHT_MID
  pages:
    - id: page_nfc
      widgets:
        - label:
              id: label_nfc
              text: "\uf068" # insert rfid card
              styles: [icon_xlarge_style]
              align: CENTER
        - label:
            text: "Scan Music Card to Play"
            styles: [mono_large_style]
            align_to:
              id: label_nfc
              align: OUT_BOTTOM_MID
              y: 10
    - id: page_artist
      pad_all: 20
      widgets:
      # show album artwork with artist and album title, page navigation to browse albums
        - image:
            id: image_album
            src: current_album_img
            width: 500
            height: 500
            y: -60
            align: CENTER
            radius: 8
            hidden: true
        - label:
            id: label_album_name
            text: "Album Name"
            width: 100%
            long_mode: SCROLL_CIRCULAR
            align_to:
              id: image_album
              align: OUT_TOP_MID
              y: -50
            text_align: CENTER
            styles: [sans_large_style]
        - label:
            id: label_album_artist
            text: "Album Artist"
            width: 100%
            long_mode: SCROLL_CIRCULAR
            align_to:
              id: image_album
              align: OUT_TOP_MID
              y: -100
            text_align: CENTER
            styles: [sans_large_style]
    - id: page_player
      pad_left: 20
      pad_right: 20
      pad_top: 20
      pad_bottom: 50
      widgets:
      # show album artwork with artist, album title and track title
        - image:
            id: image_current_album
            src: current_album_img
            width: 500
            height: 500
            y: -60
            align: CENTER
            radius: 8
            hidden: true
        - label:
            id: label_current_album_name
            text: "Current Album Name"
            width: 100%
            long_mode: SCROLL_CIRCULAR
            align_to:
              id: image_current_album
              align: OUT_TOP_MID
              y: -50
            text_align: CENTER
            styles: [sans_large_style]
        - label:
            id: label_current_album_artist
            text: "Current Album Artist"
            width: 100%
            long_mode: SCROLL_CIRCULAR
            align_to:
              id: image_current_album
              align: OUT_TOP_MID
              y: -100
            text_align: CENTER
            styles: [sans_large_style]
        - label:
            id: label_current_track
            text: "Current Track"
            width: 100%
            long_mode: SCROLL_CIRCULAR
            align_to:
              id: image_current_album
              align: OUT_BOTTOM_MID
              y: 50
            text_align: CENTER
            styles: [sans_large_style]
        # player controls
        - button:
            id: button_play
            align: BOTTOM_MID
            bg_color: ${highlight_color}
            styles: [button_style]
            widgets:
              - label:
                  align: CENTER
                  id: label_button_play
                  text: "\ue037"
            on_click:
              - homeassistant.action:
                  action: media_player.media_play_pause
                  data:
                    entity_id: ${media_player_entity}
        - button:
            id: button_previous
            align_to:
              id: button_play
              align: OUT_LEFT_MID
              x: -20
            bg_opa: TRANSP
            styles: [button_style]
            widgets:
              - label:
                  align: CENTER
                  id: label_button_previous
                  text: "\ue045"
            on_click:
              - homeassistant.action:
                  action: media_player.media_previous_track
                  data:
                    entity_id: ${media_player_entity}
        - button:
            id: button_next
            align_to:
              id: button_play
              align: OUT_RIGHT_MID
              x: 20
            bg_opa: TRANSP
            styles: [button_style]
            widgets:
              - label:
                  align: CENTER
                  id: label_button_next
                  text: "\ue044"
            on_click:
              - homeassistant.action:
                  action: media_player.media_next_track
                  data:
                    entity_id: ${media_player_entity}
        - button:
            id: button_shuffle
            align_to:
              id: button_previous
              align: OUT_LEFT_MID
              x: -18
            checkable: true
            bg_opa: TRANSP
            text_color: 0x666666
            styles: [button_style]
            checked:
              bg_opa: TRANSP
              text_color: ${highlight_color}
            widgets:
              - label:
                  align: CENTER
                  id: label_button_shuffle
                  text: "\ue043"
            on_click:
              - homeassistant.action:
                  action: media_player.shuffle_set
                  data:
                    entity_id: ${media_player_entity}
                    shuffle: !lambda return x;
        - button:
            id: button_repeat
            align_to:
              id: button_next
              align: OUT_RIGHT_MID
              x: 18
            bg_opa: TRANSP
            styles: [button_style]
            widgets:
              - label:
                  align: CENTER
                  id: label_button_repeat
                  text: "\ue040"
                  text_color: 0x666666
                  # styles: [icon_large_style]
            on_click:
              - homeassistant.action:
                  action: media_player.repeat_set
                  data:
                    entity_id: ${media_player_entity}
                    repeat: !lambda |
                      if (id(repeat_state).state == "off") return "all";
                      if (id(repeat_state).state == "all") return "one";
                      return "off";
        - button:
            id: button_external_speaker
            align: BOTTOM_RIGHT
            checkable: true
            bg_opa: TRANSP
            text_color: 0x666666
            styles: [button_style]
            checked:
              bg_opa: TRANSP
              text_color: ${highlight_color}
            widgets:
              - label:
                  align: CENTER
                  id: label_button_external_speaker
                  text: "\ue32d"
        - bar:
            id: bar_track_progress
            width: 100%
            height: 10
            value: 0
            align_to:
              id: button_play
              align: OUT_TOP_MID
              y: -50
  on_idle:
    timeout: 30s
    then:
      - if:
          condition:
            and:
              - lambda: 'return id(media_player_state).state == "playing";'
              - binary_sensor.is_on: charging
          then:
            - logger.log: "LVGL idle but playing and charging — staying awake"
            - lambda: 'lv_disp_trig_activity(NULL);'  # reset idle timer so it re-checks in 30s
          else:
            - logger.log: "LVGL is idle"
            - light.turn_off: backlight
            - lvgl.pause:
