script:
  # Shows the volume overlay and auto-hides it after 2 s.
  # mode: restart resets the timer on every encoder step while turning.
  - id: show_volume_overlay
    mode: restart
    then:
      - lvgl.widget.show: overlay_volume
      - delay: 2s
      - lvgl.widget.hide: overlay_volume

  # Clears encoder_active after 500 ms, allowing HA-side changes to sync again.
  # mode: restart resets the window on every new encoder tick.
  - id: suppress_ha_echo
    mode: restart
    then:
      - delay: 500ms
      - globals.set:
          id: encoder_active
          value: 'false'

text_sensor:
  # sensor for media player state
  - platform: homeassistant
    id: media_player_state
    entity_id: ${media_player_entity}
    on_value:
      then:
        # - lvgl.widget.update:
            # id: button_play
            # state:
              # checked: !lambda return (x == "playing");
        - if:
            condition:
              lambda: return (x == "playing");
            then:
              - lvgl.label.update:
                  id: label_button_play
                  text: "\ue034" # pause
            else:
              - lvgl.label.update:
                  id: label_button_play
                  text: "\ue037" # play

  # sensor for shuffle
  - platform: homeassistant
    id: shuffle_state
    entity_id: ${media_player_entity}
    attribute: shuffle
    on_value:
      then:
        - lvgl.widget.update:
            id: button_shuffle
            state:
              checked: !lambda 'return (x == "True" || x == "true" || x == "on");'

  # sensor for repeat
  - platform: homeassistant
    id: repeat_state
    entity_id: ${media_player_entity}
    attribute: repeat
    on_value:
      then:
        - if:
            condition:
              lambda: return (x == "all");
            then:
              - lvgl.label.update:
                  id: label_button_repeat
                  text: "\ue040" # repeat (magenta)
                  text_color: ${highlight_color}
            else:
              if:
                condition:
                  lambda: return (x == "one");
                then:
                  - lvgl.label.update:
                      id: label_button_repeat
                      text: "\ue041" # repeat_one (magenta)
                      text_color: ${highlight_color}
                else:
                  - lvgl.label.update:
                      id: label_button_repeat
                      text: "\ue040" # repeat (gray)
                      text_color: 0x666666

  # sensors for current album name, artist, track and artwork
  - platform: homeassistant
    id: current_album_name
    entity_id: ${media_player_entity}
    attribute: media_album_name
    on_value:
      then:
        - lvgl.label.update:
            id: label_current_album_name
            text: !lambda return x;

  - platform: homeassistant
    id: current_album_artist
    entity_id: ${album_artist_sensor} # use home assistant template sensor for fallback to track artist if album artist is unavailable
    on_value:
      then:
        - lvgl.label.update:
            id: label_current_album_artist
            text: !lambda return x;

  - platform: homeassistant
    id: current_track
    entity_id: ${media_player_entity}
    attribute: media_title
    on_value:
      then:
        - lvgl.label.update:
            id: label_current_track
            text: !lambda return x;

  - platform: homeassistant
    id: current_album_artwork
    entity_id: ${media_player_entity}
    attribute: entity_picture
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x.length() > 0 && x != "unknown" && x != "unavailable";'
            then:
              - lvgl.widget.hide: image_current_album
              - online_image.set_url:
                  id: current_album_img
