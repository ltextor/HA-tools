  # - file: "gfonts://Manrope"
  #   id: manrope_16
  #   size: 16
  #   bpp: 4
  #   glyphsets: [GF_Latin_Core]
  # - file: "gfonts://Manrope"
  #   id: manrope_24
  #   size: 24
  #   bpp: 4
  #   glyphsets: [GF_Latin_Core]
  - file: "gfonts://Manrope"
    id: manrope_48
    size: 48
    bpp: 4
    glyphsets: [GF_Latin_Core]

script:
  # Shows the volume overlay and auto-hides it after 2 s.
  # mode: restart resets the timer on every encoder step while turning.
  - id: show_volume_overlay
    mode: restart
    then:
      - lvgl.widget.show: overlay_volume
      - delay: 2s
      - lvgl.widget.hide: overlay_volume

  # Clears encoder_active after 500 ms, allowing HA-side changes to sync again.
  # mode: restart resets the window on every new encoder tick.
  - id: suppress_ha_echo
    mode: restart
    then:
      - delay: 500ms
      - globals.set:
          id: encoder_active
          value: 'false'

text_sensor:
  # sensor for media player state
  - platform: homeassistant
    id: media_player_state
    entity_id: ${media_player_entity}
    on_value:
      then:
        # - lvgl.widget.update:
            # id: button_play
            # state:
              # checked: !lambda return (x == "playing");
        - if:
            condition:
              lambda: return (x == "playing");
            then:
              - lvgl.label.update:
                  id: label_button_play
                  text: "\ue034" # pause
            else:
              - lvgl.label.update:
                  id: label_button_play
                  text: "\ue037" # play

  # sensor for repeat
  - platform: homeassistant
    id: repeat_state
    entity_id: ${media_player_entity}
    attribute: repeat
    on_value:
      then:
        - if:
            condition:
              lambda: return (x == "all");
            then:
              - lvgl.label.update:
                  id: label_button_repeat
                  text: "\ue040" # repeat (magenta)
                  text_color: ${highlight_color}
            else:
              if:
                condition:
                  lambda: return (x == "one");
                then:
                  - lvgl.label.update:
                      id: label_button_repeat
                      text: "\ue041" # repeat_one (magenta)
                      text_color: ${highlight_color}
                else:
                  - lvgl.label.update:
                      id: label_button_repeat
                      text: "\ue040" # repeat (gray)
                      text_color: 0x888888

  # sensors for current album name and artist
  - platform: homeassistant
    id: current_album_name
    entity_id: ${media_player_entity}
    attribute: media_album_name
    on_value:
      then:
        - lvgl.label.update:
            id: label_current_album_name
            text: !lambda 'return x;'
  - platform: homeassistant
    id: current_album_artist
    entity_id: ${media_player_entity}
    attribute: media_album_artist
    on_value:
      then:
        - lvgl.label.update:
            id: label_current_album_artist
            text: !lambda 'return x;'

  # Hidden trigger: watches the media_player track id and refreshes queue sensors on change
  - platform: homeassistant
    id: mp_content_id
    entity_id: ${media_player_entity}
    attribute: media_content_id
    internal: true
    on_value:
      - homeassistant.action:
          action: music_assistant.get_queue
          data:
            entity_id: ${media_player_entity}
          capture_response: true
          on_success:
            - lambda: |-
                JsonObjectConst q = response["response"]["${media_player_entity}"];

                // ---- CURRENT ----
                if (!q["current_item"].isNull()) {
                  JsonObjectConst mi = q["current_item"]["media_item"];

                  std::string artists;
                  for (JsonVariantConst a : mi["artists"].as<JsonArrayConst>()) {
                    if (!artists.empty()) artists += " / ";
                    artists += a["name"].as<std::string>();
                  }
                  id(current_artist).publish_state(artists);
                  id(current_track).publish_state(mi["name"].as<std::string>());

                  std::string art;
                  if (!mi["album"]["image"].isNull())
                    art = mi["album"]["image"].as<std::string>();
                  else if (!mi["image"].isNull())
                    art = mi["image"].as<std::string>();
                  id(current_artwork).publish_state(art);
                } else {
                  id(current_artist).publish_state("");
                  id(current_track).publish_state("");
                  id(current_artwork).publish_state("");
                }

                // ---- NEXT ----
                if (!q["next_item"].isNull()) {
                  JsonObjectConst mi = q["next_item"]["media_item"];

                  std::string artists;
                  for (JsonVariantConst a : mi["artists"].as<JsonArrayConst>()) {
                    if (!artists.empty()) artists += " / ";
                    artists += a["name"].as<std::string>();
                  }
                  id(next_artist).publish_state(artists);
                  id(next_track).publish_state(mi["name"].as<std::string>());

                  std::string art;
                  if (!mi["album"]["image"].isNull())
                    art = mi["album"]["image"].as<std::string>();
                  else if (!mi["image"].isNull())
                    art = mi["image"].as<std::string>();
                  id(next_artwork).publish_state(art);
                } else {
                  id(next_artist).publish_state("");
                  id(next_track).publish_state("");
                  id(next_artwork).publish_state("");
                }
          on_error:
            - logger.log: "get_queue action failed"

  # sensors for current and next track info, updated by the above trigger
  - platform: template
    id: current_artist
    name: "Current Artist"
    on_value:
      then:
        - lvgl.label.update:
            id: label_current_artist
            text: !lambda 'return x;'
  - platform: template
    id: current_track
    name: "Current Track"
    on_value:
      then:
        - lvgl.label.update:
            id: label_current_track
            text: !lambda 'return x;'
  - platform: template
    id: current_artwork
    name: "Current Artwork"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x.length() > 0 && x != "unknown" && x != "unavailable";'
            then:
              - lvgl.widget.hide: image_current_album
              - online_image.set_url:
                  id: current_album_img
                  url: !lambda 'return x;'
              # - component.update: current_album_img
            else:
              - lvgl.widget.hide: image_current_album
  - platform: template
    id: next_artist
    name: "Next Artist"
    on_value:
      then:
        - lvgl.label.update:
            id: label_next_artist
            text: !lambda 'return x;'
  - platform: template
    id: next_track
    name: "Next Track"
    on_value:
      then:
        - lvgl.label.update:
            id: label_next_track
            text: !lambda 'return x;'
  - platform: template
    id: next_artwork
    name: "Next Artwork"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x.length() > 0 && x != "unknown" && x != "unavailable";'
            then:
              - lvgl.widget.hide: image_next_album
              - online_image.set_url:
                  id: next_album_img
                  url: !lambda 'return x;'
              # - component.update: next_album_img
            else:
              - lvgl.widget.hide: image_next_album

online_image:
  - id: current_album_img
    type: RGB565
    url: "https://upload.wikimedia.org/wikipedia/commons/e/e1/White_Pixel_1x1.jpg" # Valid dummy URL to satisfy compiler and avoid DNS/localhost crashes
    format: jpg
    # update_interval: never
    resize: 400x400
    on_download_finished:
      then:
        - lvgl.image.update:
            id: image_current_album
            src: current_album_img
        - lvgl.widget.show: image_current_album
  - id: next_album_img
    type: RGB565
    url: "https://upload.wikimedia.org/wikipedia/commons/e/e1/White_Pixel_1x1.jpg" # Valid dummy URL to satisfy compiler and avoid DNS/localhost crashes
    format: jpg
    # update_interval: never
    resize: 200x200
    on_download_finished:
      then:
        - lvgl.image.update:
            id: image_next_album
            src: next_album_img
        - lvgl.widget.show: image_next_album

lvgl:
  byte_order: little_endian
  rotation: 90
  # disp_bg_color: black
  theme:
    dark_mode: true
    page:
      pad_all: 20
    bar:
      bg_color: 0x333333
      bg_opa: COVER
      indicator:
        bg_color: ${highlight_color}
    # page:
      # bg_opa: TRANSP
  style_definitions:
    - id: mono_small_style
      text_font: jetbrains_24
      text_color: white
    - id: mono_large_style
      text_font: jetbrains_48
      text_color: white
    # - id: sans_small_style
    #   text_font: manrope_24
    #   text_color: white
    - id: sans_large_style
      text_font: manrope_48
      text_color: white
    - id: icon_small_style
      text_font: material_icons_36
      text_color: white
    - id: icon_medium_style
      text_font: material_icons_48
      text_color: white
    - id: icon_large_style
      text_font: material_icons_100
      text_color: white
    - id: icon_xlarge_style
      text_font: material_icons_250
      text_color: white
  bottom_layer:
    # bg_color: black
  top_layer:
    # bg_opa: TRANSP
    pad_top: 10
    pad_bottom: 10
    pad_left: 20
    pad_right: 20
    widgets:
      - label:
          id: label_timer
          text: "0:00"
          styles: [mono_small_style]
          align: TOP_LEFT
          # x: 10
      - label:
          id: label_wifi_status
          text: "\ue63e" # wifi 3 bar (initial state)
          styles: [icon_small_style]
          align: TOP_RIGHT
          # x: -10
          hidden: true
      - label:
          id: label_notconnected
          text: "\ue648" # not connected
          styles: [icon_small_style]
          align: TOP_RIGHT
          # x: -10
      - label:
          id: label_battery_status
          text: "\uf302" # battery unknown (initial state, before voltage is read)
          styles: [icon_medium_style]
          align_to:
            id: label_wifi_status
            align: OUT_LEFT_MID
            x: -20
            y: 4
      - label:
          id: label_battery_charging
          text: "\uf305" # battery charging
          styles: [icon_medium_style]
          align_to:
            id: label_wifi_status
            align: OUT_LEFT_MID
            x: -20
            y: 4
          hidden: true
      # ----- VOLUME OVERLAY -----
      - obj:
          id: overlay_volume
          hidden: true
          width: 670
          height: SIZE_CONTENT
          align: CENTER
          bg_opa: 90%
          radius: 20
          pad_all: 25
          widgets:
            - label:
                text: "\ue050" # volume
                styles: [icon_medium_style]
                align: LEFT_MID
            - bar:
                id: bar_volume
                width: 550
                height: 30
                value: 0
                align: RIGHT_MID
  pages:
    - id: page_nfc
      widgets:
        - label:
              id: label_nfc
              text: "\uf068" # insert rfid card
              styles: [icon_xlarge_style]
              align: CENTER
        - label:
            text: "Scan Music Card to Play"
            styles: [mono_large_style]
            align_to:
              id: label_nfc
              align: OUT_BOTTOM_MID
              y: 10
    - id: page_artist
      widgets:
        - label:
            text: "No Artist Playing"
            align: CENTER
            styles: [mono_large_style]
    - id: page_player
      widgets:
      # TO DO limit width of text fields (truncated with ... or scrolling)
        # current album artwork on the left (with album on top and track on bottom)
        - image:
            id: image_current_album
            src: current_album_img
            width: 400
            height: 400
            align: LEFT_MID
            # x: 10
            # y: 50
            radius: 8
            hidden: true
        - label:
            id: label_current
            text: "Current Album"
            align_to:
              id: image_current_album
              align: OUT_TOP_LEFT
              y: -10
            styles: [mono_small_style]
        - label:
            id: label_current_album_name
            text: "Current Album Name"
            align_to:
              id: label_current
              align: OUT_TOP_LEFT
              y: -20
            styles: [sans_large_style]
        - label:
            id: label_current_album_artist
            text: "Current Album Artist"
            align_to:
              id: label_current_album_name
              align: OUT_TOP_LEFT
              y: -10
            styles: [sans_large_style]
        - label:
            id: label_current_artist
            text: "Current Artist"
            align_to:
              id: image_current_album
              align: OUT_BOTTOM_LEFT
              y: 20
            styles: [sans_large_style]
        - label:
            id: label_current_track
            text: "Current Track"
            align_to:
              id: label_current_artist
              align: OUT_BOTTOM_LEFT
              y: 10
            styles: [sans_large_style]
        # next album artwork on the right (with track on bottom)
        - image:
            id: image_next_album
            src: next_album_img
            width: 200
            height: 200
            align: RIGHT_MID
            # x: -10
            y: -100
            radius: 8
            hidden: true
        - label:
            id: label_next_artist
            text: "Next Artist"
            align_to:
              id: image_next_album
              align: OUT_BOTTOM_RIGHT
              y: 20
            styles: [sans_large_style]
        - label:
            id: label_next_track
            text: "Next Track"
            align_to:
              id: label_next_artist
              align: OUT_BOTTOM_RIGHT
              y: 10
            styles: [sans_large_style]
        # player controls
        - button:
            id: button_play
            align: BOTTOM_MID
            y: 30
            # checkable: true
            width: 60
            height: 60
            radius: 30
            bg_color: ${highlight_color}
            # checked:
              # bg_color: ${highlight_color}
              # bg_opa: COVER
              # text_color: white
            widgets:
              - label:
                  align: CENTER
                  id: label_button_play
                  text: "\ue037"
                  styles: [icon_medium_style]
            on_click:
              - homeassistant.action:
                  action: media_player.media_play_pause
                  data:
                    entity_id: ${media_player_entity}
        - button:
            id: button_previous
            align_to:
              id: button_play
              align: OUT_LEFT_MID
              x: -40
            bg_opa: TRANSP
            widgets:
              - label:
                  align: CENTER
                  id: label_button_previous
                  text: "\ue01f"
                  styles: [icon_medium_style]
            on_click:
              - homeassistant.action:
                  action: media_player.media_previous_track
                  data:
                    entity_id: ${media_player_entity}
        - button:
            id: button_next
            align_to:
              id: button_play
              align: OUT_RIGHT_MID
              x: 40
            bg_opa: TRANSP
            widgets:
              - label:
                  align: CENTER
                  id: label_button_next
                  text: "\ue020"
                  styles: [icon_medium_style]
            on_click:
              - homeassistant.action:
                  action: media_player.media_next_track
                  data:
                    entity_id: ${media_player_entity}
        - button:
            id: button_shuffle
            align_to:
              id: button_previous
              align: OUT_LEFT_MID
              x: -40
            checkable: true
            bg_opa: TRANSP
            checked:
              text_color: ${highlight_color}
            widgets:
              - label:
                  align: CENTER
                  id: label_button_shuffle
                  text: "\ue043"
                  styles: [icon_medium_style]
            on_click:
              - homeassistant.action:
                  action: media_player.shuffle_set
                  data:
                    entity_id: ${media_player_entity}
                    shuffle: !lambda return x;
        - button:
            id: button_repeat
            align_to:
              id: button_next
              align: OUT_RIGHT_MID
              x: 40
            bg_opa: TRANSP
            widgets:
              - label:
                  align: CENTER
                  id: label_button_repeat
                  text: "\ue040"
                  text_color: 0x888888
                  styles: [icon_medium_style]
            on_click:
              - homeassistant.action:
                  action: media_player.repeat_set
                  data:
                    entity_id: ${media_player_entity}
                    repeat: !lambda |
                      if (id(repeat_state).state == "off") return "all";
                      if (id(repeat_state).state == "all") return "one";
                      return "off";
  on_idle:
    timeout: 30s
    then:
      - if:
          condition:
            and:
              - lambda: 'return id(media_player_state).state == "playing";'
              - binary_sensor.is_on: charging
          then:
            - logger.log: "LVGL idle but playing and charging — staying awake"
            - lambda: 'lv_disp_trig_activity(NULL);'  # reset idle timer so it re-checks in 30s
          else:
            - logger.log: "LVGL is idle"
            - light.turn_off: backlight
            - lvgl.pause:




