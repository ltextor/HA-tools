# implemented
# display off when inactive
# wakeup on touchscreen, encoder turn and press, nfc activity (also reset inactivity counter for encoder and nfc)

# implemented > testing
# changed volume bar logic
# wifi and battery icons
# screensaver during night
# keep display on when playing and power connected

# to do
# basic pages
# Sleep: counter, when 0 finish song and pause, set sleeping true and show sleep overlay, block encoder button and rfid
# Sleep value: exposed to HA, when changed push sleep reset button
# Sleep reset: exposed to HA, when pushed remove sleep overlay, reset sleep counter, set sleeping false (enables encoder button and rfid)
# Sleep midnight: push sleep reset button


substitutions:
  device_name: "media-player-tablet"
  device_friendly_name: "Media Player Tablet"
  media_player_entity: "media_player.media_player_tablet_2"  # Music Assistant version of the Home Assistant Media Player (add to Music Assistant manually)
  external_media_player_entity: "media_player.wohnzimmer_3"  # External media player (Music Assistant version) which can be used as external speaker
  highlight_color: "0xFF00FF" # highlight color used for buttons, bars etc.

globals:
  # Tracks the current volume (0.0–1.0). Initialised to -1.0 as a sentinel
  # meaning "not yet synced from HA". The encoder won't act until HA pushes
  # the first value after boot. Not persisted to flash — always restored from HA.
  - id: current_volume
    type: float
    restore_value: false
    initial_value: '-1.0'

  # True while the encoder is actively turning. Suppresses HA echo-back so the
  # round-trip (encoder → HA → ha_volume callback) doesn't fight the encoder.
  - id: encoder_active
    type: bool
    restore_value: false
    initial_value: 'false'

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}
  platformio_options:
    build_flags:
      - -DUSE_RGB565LE  # Little-endian RGB565 for LVGL images (required for Tab5 V2)
  on_boot:
    priority: -100 # test to fix boot loop
    then:
      # read the RTC time once when the system boots
      - rx8130.read_time:
      - select.set:
          id: dac_output_select
          option: "LINE1"
      - light.turn_on:
          id: backlight
          brightness: 60%

esp32:
  board: esp32-p4-evboard # test to fix boot loop
  # variant: esp32p4
  engineering_sample: true  # not part of the official m5stack yaml, but without it my esp32-p4 crashed during boot
  flash_size: 16MB
  cpu_frequency: 360MHz # test to fix boot loop
  framework:
    type: esp-idf
    sdkconfig_options:
      # ── Memory / PSRAM ──────────────────────────────
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "4096"
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "32768"
      CONFIG_SPIRAM_ALLOW_STACK_EXTERNAL_MEMORY: "y"
      # ── Task Stack Sizes ────────────────────────────
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "16384"
      CONFIG_FREERTOS_IDLE_TASK_STACKSIZE: "2048"
      # ── PSRAM Speed (choose one) ────────────────────
      # CONFIG_SPIRAM_SPEED_200M: "y"   # Keep if stable
      CONFIG_SPIRAM_SPEED_100M: "y"     # Use if seeing corruption
      # ── Stability ──────────────────────────────────
      CONFIG_FREERTOS_WATCHPOINT_END_OF_STACK: "y"
      CONFIG_ESP_INT_WDT_TIMEOUT_MS: "800"
    # log_level: DEBUG # test to fix boot loop > might reveal the underlying issue in the logs
    advanced:
      enable_idf_experimental_features: true

esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret mediaplayertablet_api_key
  # show wifi status when connected, otherwise wifi unavailable icon
  on_client_connected:
    - wait_until:
        condition:
          api.connected:
            state_subscription_only: true
    - lvgl.widget.hide: label_notconnected
    - lvgl.widget.show: label_wifi_status
    # optional to do > boot screen which hides after connecting
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.show: label_notconnected
          - lvgl.widget.hide: label_wifi_status
  # nfc tag is scanned and media id is passed to device > show album or player page
  # optional todo: show rfid scanning overlay for 3s
  services:
    - service: play_nfc_media
      variables:
        media_id: string
      then:
        - if:
            condition:
              lambda: 'return media_id.find("artist") != std::string::npos;'
            then:
              # artist rfid card
              - lvgl.page.show:
                  id: page_artist
                  animation: FADE_IN
              # - script.execute: fetch_artist_albums
            else:
              # album or playlist rfid card
              - lvgl.page.show:
                  id: page_player
                  animation: FADE_IN
              - homeassistant.action:
                  action: media_player.play_media
                  data:
                    entity_id: ${media_player_entity}
                    enqueue: replace
                    media_content_type: music
                  data_template:
                    media_content_id: !lambda 'return media_id;'

ota:
  - platform: esphome
    password: !secret mediaplayertablet_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # fast_connect : true # test to fix boot loop
  ap:
    ssid: "Media Player Tablet"
    password: !secret fallback_password

http_request:
  verify_ssl: false

captive_portal:

psram:
  mode: hex
  # speed: 200MHz
  speed: 100MHz # test to fix boot loop

i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz
  - id: external_i2c
    sda: GPIO53
    scl: GPIO54

esp_ldo:
  # - voltage: 1.1V
  #   channel: 4  # MIPI DSI Logic
  # - voltage: 2.7V
  #   channel: 3  # Analog Power
  - voltage: 2.5V
    channel: 3

pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
    i2c_id: bsp_bus
    # 0: O - wifi_antenna_int_ext
    # 1: O - speaker_enable
    # 2: O - external_5v_power
    # 3: NC
    # 4: O - lcd reset
    # 5: O - touch panel reset
    # 6: O - camera reset
    # 7: I - headphone detect
  - id: pi4ioe2
    address: 0x44
    i2c_id: bsp_bus
    # 0: O - wifi_power
    # 1: NC
    # 2: NC
    # 3: O - usb_5v_power
    # 4: O - poweroff pulse
    # 5: O - quick charge enable (inverted)
    # 6: I - charging status
    # 7: O - charge enable

i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO29
    i2s_bclk_pin: GPIO27
    i2s_mclk_pin: GPIO30

# audio_adc:
#   - platform: es7210
#     id: es7210_adc
#     i2c_id: bsp_bus
#     bits_per_sample: 16bit
#     sample_rate: 16000

audio_dac:
  - platform: es8388
    id: es8388_dac
    i2c_id: bsp_bus

# microphone:
#   - platform: i2s_audio
#     id: tab5_microphone
#     i2s_din_pin: GPIO28
#     sample_rate: 16000
#     bits_per_sample: 16bit
#     adc_type: external

speaker:
  - platform: i2s_audio
    id: tab5_speaker
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: mono
    buffer_duration: 500ms
    bits_per_sample: 16bit
    sample_rate: 48000

display:
  - platform: mipi_dsi
    id: lcd
    dimensions:
      height: 1280
      width: 720
    model: M5STACK-TAB5-V2
    # pixel_mode: 24bit  # Required for correct color output on Tab5 V2
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
      # inverted: true # test to fix boot loop > not working
    show_test_card: false

touchscreen:
  - platform: st7123
    id: touch
    display: lcd
    i2c_id: bsp_bus
    interrupt_pin: GPIO23
    update_interval: never
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: backlight

output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

  # M5Stack Unit Scroll — single RGB LED
  # - platform: m5unit_scroll
  #   m5unit_scroll_id: unit_scroll
  #   led_index: 0
  #   channel: red
  #   id: led0_red
  # - platform: m5unit_scroll
  #   m5unit_scroll_id: unit_scroll
  #   led_index: 0
  #   channel: green
  #   id: led0_green
  # - platform: m5unit_scroll
  #   m5unit_scroll_id: unit_scroll
  #   led_index: 0
  #   channel: blue
  #   id: led0_blue

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

  # M5Stack Unit Scroll — single RGB LED
  # - platform: rgb
  #   name: "Scroll LED"
  #   id: scroll_led
  #   red: led0_red
  #   green: led0_green
  #   blue: led0_blue
  #   restore_mode: ALWAYS_OFF
  #   default_transition_length: 0s

time:
  - platform: rx8130
    id: rtc_time
    i2c_id: bsp_bus
    # repeated synchronization is not necessary unless the external RTC
    # is much more accurate than the internal clock
    update_interval: never
    timezone: UTC
    on_time:
      - hours: 1
        minutes: 5
        seconds: 0
        then:
          - logger.log: "Starting Antiburn" # will turn off on next touchscreen event
          - if:
              condition: lvgl.is_paused
              then:
                - lvgl.resume:
                - lvgl.widget.redraw:
          - lvgl.pause:
              show_snow: true

switch:
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3
  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0
  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2
    restore_mode: ALWAYS_ON

binary_sensor:
  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN
    on_press:
      then:
        - lvgl.widget.show: label_battery_charging
        - lvgl.widget.hide: label_battery_status
    on_release:
      then:
        - lvgl.widget.show: label_battery_status
        - lvgl.widget.hide: label_battery_charging

  - platform: gpio
    id: headphone_detect
    name: "Headphone Detect"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7
    trigger_on_initial_state: true
    on_press:
      then:
        - switch.turn_off: speaker_enable
    on_release:
      then:
        - switch.turn_on: speaker_enable

  # M5Stack Unit Scroll
  - platform: m5unit_scroll
    m5unit_scroll_id: unit_scroll
    name: "Unit Scroll Button"
    on_press:
      then:
        - if:
            condition: lvgl.is_paused
            then:
              - logger.log: "LVGL resuming"
              - lvgl.resume:
              - lvgl.widget.redraw:
              - light.turn_on: backlight
        - lambda: 'lv_disp_trig_activity(NULL);'  # resets LVGL idle timer
        - homeassistant.service:
            service: media_player.media_play_pause
            data:
              entity_id: ${media_player_entity}

  # sensor for shuffle
  - platform: homeassistant
    id: shuffle_state
    entity_id: ${media_player_entity}
    attribute: shuffle
    on_state:
      then:
        - lvgl.widget.update:
            id: button_shuffle
            state:
              checked: !lambda return x;

  - platform: status
    name: "Status"

button:
  - platform: restart
    name: "Restart"

# The DAC Output select needs to be manually (or with an automation) changed to `LINE1` for the onboard speaker
select:
  - platform: es8388
    dac_output:
      name: DAC Output
      id: dac_output_select
    adc_input_mic:
      name: ADC Input Mic

# A friendlier UI on top of the `wifi_antenna_int_ext` GPIO switch defined in
# config.yaml. Lets the user pick "Internal" / "External" rather than toggling
# a raw on/off switch.
  - platform: template
    id: wifi_antenna_select
    name: "WiFi Antenna"
    options:
      - "Internal"
      - "External"
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: return i == 0;
          then:
            - switch.turn_off: wifi_antenna_int_ext
          else:
            - switch.turn_on: wifi_antenna_int_ext

sensor:
  - platform: ina226
    i2c_id: bsp_bus
    address: 0x41
    adc_averaging: 16
    max_current: 8.192A
    shunt_resistance: 0.005ohm
    bus_voltage:
      id: battery_voltage
      name: "Battery Voltage"
    current:
      id: battery_current
      name: "Battery Current"
      # Positive means discharging
      # Negative means charging

# M5Stack Unit Scroll
  - platform: m5unit_scroll
    name: "Unit Scroll Encoder"
    id: unit_scroll
    i2c_id: external_i2c
    address: 0x40
    update_interval: 50ms
    increment:
      name: "Unit Scroll Increment"
      # on_value only fires when non-zero (the C++ component filters idle polls)
      on_value:
        then:
          - if:
              condition: lvgl.is_paused
              then:
                - logger.log: "LVGL resuming"
                - lvgl.resume:
                - lvgl.widget.redraw:
                - light.turn_on: backlight
          - lambda: 'lv_disp_trig_activity(NULL);'  # resets LVGL idle timer
          - if:
              condition:
                # Guard: ignore until HA has synced the initial volume after boot
                lambda: 'return id(current_volume) >= 0.0f;'
              then:
                # Mark encoder as active to suppress HA echo-back for 500 ms
                - globals.set:
                    id: encoder_active
                    value: 'true'
                - script.execute: suppress_ha_echo
                - globals.set:
                    id: current_volume
                    value: !lambda |-
                      float v = id(current_volume) + x * 0.02f;
                      if (v < 0.0f) v = 0.0f;
                      if (v > 1.0f) v = 1.0f;
                      return v;
                - homeassistant.service:
                    service: media_player.volume_set
                    data:
                      entity_id: ${media_player_entity}
                    data_template:
                      volume_level: !lambda 'return id(current_volume);'
                - lvgl.bar.update:
                    id: bar_volume
                    value: !lambda 'return (int)(id(current_volume) * 100);'
                # - lvgl.label.update:
                #     id: volume_label
                #     text: !lambda |-
                #       char buf[8];
                #       sprintf(buf, "%d%%", (int)(id(current_volume) * 100));
                #       return std::string(buf);
                - script.execute: show_volume_overlay

# HA volume level — numeric 0.0–1.0, synced from the media player entity.
# Used to keep current_volume in sync with external (HA-side) changes.
  - platform: homeassistant
    id: ha_volume
    entity_id: ${media_player_entity}
    attribute: volume_level
    on_value:
      then:
        - if:
            condition:
              # First push after boot (sentinel -1.0): sync silently, no overlay.
              # Subsequent external changes: sync AND show overlay.
              lambda: 'return id(current_volume) < 0.0f;'
            then:
              - globals.set:
                  id: current_volume
                  value: !lambda 'return x;'
            else:
              - if:
                  condition:
                    # Encoder is actively turning — HA is echoing our command back.
                    # Ignore completely: the encoder owns current_volume during this window.
                    lambda: 'return !id(encoder_active);'
                  then:
                    # Genuine external change (e.g. from HA dashboard or another device).
                    - globals.set:
                        id: current_volume
                        value: !lambda 'return x;'
                    - lvgl.bar.update:
                        id: bar_volume
                        value: !lambda 'return (int)(x * 100);'
                    # - lvgl.label.update:
                    #     id: volume_label
                    #     text: !lambda |-
                    #       char buf[8];
                    #       sprintf(buf, "%d%%", (int)(x * 100));
                    #       return std::string(buf);
                    - script.execute: show_volume_overlay

# Tab5 built-in battery discharges from full (8.23 V) to shutdown threshold (6.0 V)
  - platform: template
    name: "Battery Percentage"
    id: battery_percentage
    lambda: |-
      float voltage = id(battery_voltage).state;
      // Adjust these values based on your battery's actual min/max voltage
      float min_voltage = 6.0;  // Discharged voltage
      float max_voltage = 8.23;  // Fully charged voltage
      float percentage = (voltage - min_voltage) / (max_voltage - min_voltage) * 100.0;
      if (percentage > 100.0) return 100.0;
      if (percentage < 0.0) return 0.0;
      return percentage;
    update_interval: 60s
    unit_of_measurement: "%"
    accuracy_decimals: 1
    on_value:
      then:
        - lvgl.label.update:
            id: label_battery_status
            text: !lambda |-
              if      (x > 95) return "\uf304"; // battery full
              else if (x > 80) return "\uf307";
              else if (x > 65) return "\uf308";
              else if (x > 50) return "\uf309";
              else if (x > 35) return "\uf30a";
              else if (x > 20) return "\uf30b";
              else if (x > 5)  return "\uf30c";
              else             return "\uf30d"; // battery empty

  # wifi sensors
  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
    
  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: ""
    icon: "mdi:wifi"
    on_value:
      then:
        - lvgl.label.update:
            id: label_wifi_status
            text: !lambda |-
              if      (x > 66) return "\ue63e"; // wifi 3 bar
              else if (x > 33) return "\ue4d9"; // wifi 2 bar
              else             return "\ue4ca"; // wifi 1 bar

# Media player
media_player:
  - platform: speaker
    name: None
    id: local_media_player
    announcement_pipeline:
      speaker: tab5_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1

# M5Stack RFID reader
rc522_i2c:
  address: 0x28
  i2c_id: external_i2c
  on_tag:
    then:
      - homeassistant.tag_scanned: !lambda 'return x;'
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: backlight
      - lambda: 'lv_disp_trig_activity(NULL);'  # resets LVGL idle timer
  on_tag_removed:
    then:
      - homeassistant.service:
          service: media_player.media_pause
          data:
            entity_id: ${media_player_entity}
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: backlight
      - lambda: 'lv_disp_trig_activity(NULL);'  # resets LVGL idle timer
      - lvgl.page.show:
          id: page_nfc
          animation: FADE_IN

# M5Stack unit scroll
external_components:
  - source:
      type: git
      url: https://github.com/ltextor/HA-tools
      ref: main
      path: ESPHome/MediaPlayerTablet/components
    components: [m5unit_scroll]
  - source: "github://pr#12075"
    components: [st7123]

font:
