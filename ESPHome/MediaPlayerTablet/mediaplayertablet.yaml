    id: material_icons_36
    size: 36
    bpp: 4
    glyphs:
      - "\ue4ca" # wifi 1 bar
      - "\ue4d9" # wifi 2 bar
      - "\ue63e" # wifi 3 bar
      - "\ue648" # no wifi
  - file: "gfonts://Material Symbols Outlined"
    id: material_icons_48
    size: 48
    bpp: 4
    glyphs:
      - "\uf30d" # battery_empty
      - "\uf30c" # battery_1
      - "\uf30b" # battery_2
      - "\uf30a" # battery_3
      - "\uf309" # battery_4
      - "\uf308" # battery_5
      - "\uf307" # battery_6
      - "\uf304" # battery_full
      - "\uf305" # battery_charging
      - "\uf302" # battery_unknown
      - "\ue050" # volume
  - file: "gfonts://Material Symbols Outlined"
    id: material_icons_100
    size: 100
    bpp: 4
    glyphs:
      - "\ue32d" # speaker
      - "\ue043" # shuffle
      - "\ue040" # repeat
      - "\ue041" # repeat_one
      - "\ue037" # play
      - "\ue034" # pause
