interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(media_player_state).state == "playing";'
          then:
            - lvgl.bar.update:
                id: bar_track_progress
                value: !lambda |-
                  float elapsed = (millis() - id(position_updated_at)) / 1000.0f;
                  return (int)(id(last_known_position) + elapsed);

online_image:
  - id: current_album_img
    type: RGB565
    url: "https://upload.wikimedia.org/wikipedia/commons/e/e1/White_Pixel_1x1.jpg" # Valid dummy URL to satisfy compiler and avoid DNS/localhost crashes
    format: jpg
    # update_interval: never
    resize: 500x500
    on_download_finished:
      then:
        - if:
            condition:
              # when artist page is currently shown
            then:
              - lvgl.image.update:
                  id: image_browse_album
                  src: current_album_img
              - lvgl.widget.show: image_browse_album
            else:
              - lvgl.image.update:
                  id: image_current_album
                  src: current_album_img
              - lvgl.widget.show: image_current_album
  # - id: next_album_img
  #   type: RGB565
  #   url: "https://upload.wikimedia.org/wikipedia/commons/e/e1/White_Pixel_1x1.jpg" # Valid dummy URL to satisfy compiler and avoid DNS/localhost crashes
