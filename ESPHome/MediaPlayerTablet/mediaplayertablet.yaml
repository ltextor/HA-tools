substitutions:
  device_name: "media-player-tablet"
  device_friendly_name: "Media Player Tablet"
  media_player_entity: "media_player.media_player_tablet_2"  # Music Assistant version of the Home Assistant Media Player (add to Music Assistant manually)

globals:
  # Tracks the current volume (0.0–1.0). Initialised to -1.0 as a sentinel
  # meaning "not yet synced from HA". The encoder won't act until HA pushes
  # the first value after boot. Not persisted to flash — always restored from HA.
  - id: current_volume
    type: float
    restore_value: false
    initial_value: '-1.0'

  # True while the encoder is actively turning. Suppresses HA echo-back so the
  # round-trip (encoder → HA → ha_volume callback) doesn't fight the encoder.
  - id: encoder_active
    type: bool
    restore_value: false
    initial_value: 'false'

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}
  platformio_options:
    build_flags:
      - -DUSE_RGB565LE  # Little-endian RGB565 for LVGL images (required for Tab5 V2)
  on_boot:
    then:
      # read the RTC time once when the system boots
      - rx8130.read_time:
      - select.set:
          id: dac_output_select
          option: "LINE1"
      - light.turn_on:
          id: backlight
          brightness: 60%

esp32:
  variant: esp32p4
  engineering_sample: true  # not part of the official m5stack yaml, but without it my esp32-p4 crashed during boot
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret mediaplayertablet_api_key

ota:
  - platform: esphome
    password: !secret mediaplayertablet_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Media Player Tablet"
    password: !secret fallback_password

http_request:
  verify_ssl: false

captive_portal:

psram:
  mode: hex
  speed: 200MHz

i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz
  - id: external_i2c
    sda: GPIO53
    scl: GPIO54

esp_ldo:
  # - voltage: 1.1V
  #   channel: 4  # MIPI DSI Logic
  # - voltage: 2.7V
  #   channel: 3  # Analog Power
  - voltage: 2.5V
    channel: 3

pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
    i2c_id: bsp_bus
    # 0: O - wifi_antenna_int_ext
    # 1: O - speaker_enable
    # 2: O - external_5v_power
    # 3: NC
    # 4: O - lcd reset
    # 5: O - touch panel reset
    # 6: O - camera reset
    # 7: I - headphone detect
  - id: pi4ioe2
    address: 0x44
    i2c_id: bsp_bus
    # 0: O - wifi_power
    # 1: NC
    # 2: NC
    # 3: O - usb_5v_power
    # 4: O - poweroff pulse
    # 5: O - quick charge enable (inverted)
    # 6: I - charging status
    # 7: O - charge enable

i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO29
    i2s_bclk_pin: GPIO27
    i2s_mclk_pin: GPIO30

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: bsp_bus
    bits_per_sample: 16bit
    sample_rate: 16000

audio_dac:
  - platform: es8388
    id: es8388_dac
    i2c_id: bsp_bus

microphone:
  - platform: i2s_audio
    id: tab5_microphone
    i2s_din_pin: GPIO28
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

speaker:
  - platform: i2s_audio
    id: tab5_speaker
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: mono
    buffer_duration: 500ms
    bits_per_sample: 16bit
    sample_rate: 48000

display:
  - platform: mipi_dsi
    id: lcd
    dimensions:
      height: 1280
      width: 720
    model: M5STACK-TAB5-V2
    pixel_mode: 24bit  # Required for correct color output on Tab5 V2
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
      # inverted: true
    show_test_card: false
    # auto_clear_enabled: false
    # update_interval: never

touchscreen:
  - platform: st7123
    id: touch
    display: lcd
    i2c_id: bsp_bus
    interrupt_pin: GPIO23
    update_interval: never
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    # NB: Those min/max values are *after* swapping (raw x is 0..720).
    calibration:
      x_min: 0
      x_max: 1280
      y_min: 0
      y_max: 720
    # Landscape orientation
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: false

output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

  # M5Stack Unit Scroll — single RGB LED
  - platform: m5unit_scroll
    m5unit_scroll_id: unit_scroll
    led_index: 0
    channel: red
    id: led0_red
  - platform: m5unit_scroll
    m5unit_scroll_id: unit_scroll
    led_index: 0
    channel: green
    id: led0_green
  - platform: m5unit_scroll
    m5unit_scroll_id: unit_scroll
    led_index: 0
    channel: blue
    id: led0_blue

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

  # M5Stack Unit Scroll — single RGB LED
  - platform: rgb
    name: "Scroll LED"
    id: scroll_led
    red: led0_red
    green: led0_green
    blue: led0_blue
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s

time:
  - platform: rx8130
    id: rtc_time
    i2c_id: bsp_bus
    # repeated synchronization is not necessary unless the external RTC
    # is much more accurate than the internal clock
    update_interval: never
    timezone: UTC

switch:
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3
  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0
  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2
    restore_mode: ALWAYS_ON

binary_sensor:
  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN
    on_state:
      then:
        - lvgl.label.update:
            id: battery_label
            text: !lambda |-
              char buf[32];
              float pct = id(battery_percentage).state;
              if (std::isnan(pct)) pct = 0.0;
              sprintf(buf, "%.1f%%%s", pct, x ? " (Charging)" : "");
              return std::string(buf);

  - platform: gpio
    id: headphone_detect
    name: "Headphone Detect"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7
    trigger_on_initial_state: true
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: headphone_detect
            then:
              - switch.turn_off: speaker_enable
            else:
              - switch.turn_on: speaker_enable

  # M5Stack Unit Scroll
  - platform: m5unit_scroll
    m5unit_scroll_id: unit_scroll
    name: "Unit Scroll Button"
    on_press:
      then:
        - homeassistant.service:
            service: media_player.media_play_pause
            data:
              entity_id: ${media_player_entity}

  # M5Stack Unit Encoder
  # - platform: m5unit_encoder
  #   m5unit_encoder_id: unit_encoder
  #   name: "Encoder Button"

  - platform: status
    name: "Status"

button:
  - platform: restart
    name: "Restart"

# The DAC Output select needs to be manually (or with an automation) changed to `LINE1` for the onboard speaker
select:
  - platform: es8388
    dac_output:
      name: DAC Output
      id: dac_output_select
    adc_input_mic:
      name: ADC Input Mic

# A friendlier UI on top of the `wifi_antenna_int_ext` GPIO switch defined in
# config.yaml. Lets the user pick "Internal" / "External" rather than toggling
# a raw on/off switch.
  - platform: template
    id: wifi_antenna_select
    name: "WiFi Antenna"
    options:
      - "Internal"
      - "External"
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: return i == 0;
          then:
            - switch.turn_off: wifi_antenna_int_ext
          else:
            - switch.turn_on: wifi_antenna_int_ext

sensor:
  - platform: ina226
    i2c_id: bsp_bus
    address: 0x41
    adc_averaging: 16
    max_current: 8.192A
    shunt_resistance: 0.005ohm
    bus_voltage:
      id: battery_voltage
      name: "Battery Voltage"
    current:
      id: battery_current
      name: "Battery Current"
      # Positive means discharging
      # Negative means charging

# M5Stack Unit Scroll
  - platform: m5unit_scroll
    name: "Unit Scroll Encoder"
    id: unit_scroll
    i2c_id: external_i2c
    address: 0x40
    update_interval: 50ms
    increment:
      name: "Unit Scroll Increment"
      # on_value only fires when non-zero (the C++ component filters idle polls)
      on_value:
        then:
          - if:
              condition:
                # Guard: ignore until HA has synced the initial volume after boot
                lambda: 'return id(current_volume) >= 0.0f;'
              then:
                # Mark encoder as active to suppress HA echo-back for 500 ms
                - globals.set:
                    id: encoder_active
                    value: 'true'
                - script.execute: suppress_ha_echo
                - globals.set:
                    id: current_volume
                    value: !lambda |-
                      float v = id(current_volume) + x * 0.02f;
                      if (v < 0.0f) v = 0.0f;
                      if (v > 1.0f) v = 1.0f;
                      return v;
                - homeassistant.service:
                    service: media_player.volume_set
                    data:
                      entity_id: ${media_player_entity}
                    data_template:
                      volume_level: !lambda 'return id(current_volume);'
                - lvgl.bar.update:
                    id: volume_bar
                    value: !lambda 'return (int)(id(current_volume) * 100);'
                - lvgl.label.update:
                    id: volume_label
                    text: !lambda |-
                      char buf[8];
                      sprintf(buf, "%d%%", (int)(id(current_volume) * 100));
                      return std::string(buf);
                - script.execute: show_volume_overlay

# Tab5 built-in battery discharges from full (8.23 V) to shutdown threshold (6.0 V)
  - platform: template
    name: "Battery Percentage"
    id: battery_percentage
    lambda: |-
      float voltage = id(battery_voltage).state;
      // Adjust these values based on your battery's actual min/max voltage
      float min_voltage = 6.0;  // Discharged voltage
      float max_voltage = 8.23;  // Fully charged voltage
      float percentage = (voltage - min_voltage) / (max_voltage - min_voltage) * 100.0;
      if (percentage > 100.0) return 100.0;
      if (percentage < 0.0) return 0.0;
      return percentage;
    update_interval: 60s
    unit_of_measurement: "%"
    accuracy_decimals: 1
    on_value:
      then:
        - lvgl.label.update:
            id: battery_label
            text: !lambda |-
              char buf[32];
              float pct = x;
              if (std::isnan(pct)) pct = 0.0;
              bool is_charging = id(charging).state;
              sprintf(buf, "%.1f%%%s", pct, is_charging ? " (Charging)" : "");
              return std::string(buf);

# M5Stack unit encoder
#   - platform: m5unit_encoder
#     id: unit_encoder
#     name: "Encoder Value"
#     i2c_id: external_i2c

# HA volume level — numeric 0.0–1.0, synced from the media player entity.
# Used to keep current_volume in sync with external (HA-side) changes.
  - platform: homeassistant
    id: ha_volume
    entity_id: ${media_player_entity}
    attribute: volume_level
    on_value:
      then:
        - if:
            condition:
              # First push after boot (sentinel -1.0): sync silently, no overlay.
              # Subsequent external changes: sync AND show overlay.
              lambda: 'return id(current_volume) < 0.0f;'
            then:
              - globals.set:
                  id: current_volume
                  value: !lambda 'return x;'
            else:
              - if:
                  condition:
                    # Encoder is actively turning — HA is echoing our command back.
                    # Ignore completely: the encoder owns current_volume during this window.
                    lambda: 'return id(encoder_active);'
                  then:
                    []  # do nothing — encoder manages current_volume exclusively
                  else:
                    # Genuine external change (e.g. from HA dashboard or another device).
                    - globals.set:
                        id: current_volume
                        value: !lambda 'return x;'
                    - lvgl.bar.update:
                        id: volume_bar
                        value: !lambda 'return (int)(x * 100);'
                    - lvgl.label.update:
                        id: volume_label
                        text: !lambda |-
                          char buf[8];
                          sprintf(buf, "%d%%", (int)(x * 100));
                          return std::string(buf);
                    - script.execute: show_volume_overlay


# external_components:
#   - source: github://m5stack/esphome-yaml/components
#     components: [m5unit_encoder]
#     refresh: 0s 

# Media player
media_player:
  - platform: speaker
    name: None
    id: local_media_player
    announcement_pipeline:
      speaker: tab5_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1

# M5Stack RFID reader
rc522_i2c:
  address: 0x28
  i2c_id: external_i2c
  on_tag:
    then:
      - homeassistant.tag_scanned: !lambda 'return x;'

# M5Stack unit scroll
external_components:
  - source:
      type: git
      url: https://github.com/ltextor/HA-tools
      ref: main
      path: ESPHome/MediaPlayerTablet/components
    components: [m5unit_scroll]
  - source: "github://pr#12075"
    components: [st7123]

font:
  - file: "gfonts://Roboto"
    id: roboto_font_24
    size: 24
    bpp: 4  # 4-bit greyscale anti-aliasing
    glyphsets:
      - GF_Latin_Core
  - file: "gfonts://Noto Emoji"
    id: icon_font_24
    size: 24
    bpp: 4  # 4-bit greyscale anti-aliasing
    glyphs:
      - "\U0001F50A"
  - file: "gfonts://Roboto"
    id: roboto_font_48
    size: 48
    bpp: 4  # 4-bit greyscale anti-aliasing
    glyphsets:
      - GF_Latin_Core

script:
  # Shows the volume overlay and auto-hides it after 2 s.
  # mode: restart resets the timer on every encoder step while turning.
  - id: show_volume_overlay
    mode: restart
    then:
      - lvgl.widget.show: volume_overlay
      - delay: 2s
      - lvgl.widget.hide: volume_overlay

  # Clears encoder_active after 500 ms, allowing HA-side changes to sync again.
  # mode: restart resets the window on every new encoder tick.
  - id: suppress_ha_echo
    mode: restart
    then:
      - delay: 500ms
      - globals.set:
          id: encoder_active
          value: 'false'

text_sensor:
  - platform: homeassistant
    id: current_track
    entity_id: ${media_player_entity}
    attribute: media_title
    on_value:
      then:
        - lvgl.label.update:
            id: track_label
            text: !lambda |-
              std::string artist = id(current_artist).state;
              if (artist == "unknown" || artist == "unavailable") artist = "";
              if (x.empty() || x == "unknown" || x == "unavailable") return std::string("No Track Playing");
              if (artist.empty()) return x;
              return artist + " - " + x;

  - platform: homeassistant
    id: current_artist
    entity_id: ${media_player_entity}
    attribute: media_artist
    on_value:
      then:
        - lvgl.label.update:
            id: track_label
            text: !lambda |-
              std::string track = id(current_track).state;
              if (track == "unknown" || track == "unavailable") track = "";
              if (track.empty() || track == "No Track Playing") return std::string("No Track Playing");
              if (x.empty() || x == "unknown" || x == "unavailable") return track;
              return x + " - " + track;

  - platform: homeassistant
    id: current_picture
    entity_id: ${media_player_entity}
    attribute: entity_picture
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x.length() > 0 && x != "unknown" && x != "unavailable";'
            then:
              - online_image.set_url:
                  id: album_art_img
                  url: !lambda 'return x;'
              - component.update: album_art_img
            else:
              - lvgl.widget.hide: album_art_widget

online_image:
  - id: album_art_img
    type: RGB
    url: "https://upload.wikimedia.org/wikipedia/commons/e/e1/White_Pixel_1x1.jpg" # Valid dummy URL to satisfy compiler and avoid DNS/localhost crashes
    format: jpg
    update_interval: never
    resize: 200x200
    on_download_finished:
      then:
        - lvgl.image.update:
            id: album_art_widget
            src: album_art_img
        - lvgl.widget.show: album_art_widget

lvgl:
  rotation: 90
  bottom_layer:
    bg_color: 0x121212
  style_definitions:
    - id: title_style
      text_font: roboto_font_48
      text_color: 0xEAEAEA
    - id: label_style
      text_font: roboto_font_24
      text_color: 0xA0A0A0
    - id: value_style
      text_font: roboto_font_48
      text_color: 0x00FF88
    - id: card_style
      bg_color: 0x1E1E1E
      bg_opa: 80%
      border_width: 1
      border_color: 0x333333
      radius: 12
      pad_all: 20
  pages:
    - id: main_page
      widgets:
        - obj:
            width: 1240
            height: 680
            align: CENTER
            layout:
              type: flex
              flex_flow: column
              flex_align_main: space_evenly
              flex_align_cross: center
            widgets:
              - label:
                  text: "System Test Screen"
                  styles: [title_style]
              - obj:
                  width: 1200
                  height: 450
                  bg_opa: 0%
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_main: space_around
                    flex_align_cross: center
                  widgets:
                    - obj:
                        width: 550
                        height: 380
                        styles: [card_style]
                        layout:
                          type: flex
                          flex_flow: column
                          flex_align_main: space_around
                          flex_align_cross: center
                        widgets:
                          - label:
                              text: "Currently Playing"
                              styles: [label_style]
                          - image:
                              id: album_art_widget
                              src: album_art_img
                              width: 200
                              height: 200
                              hidden: true
                          - label:
                              id: track_label
                              text: "No Track Playing"
                              styles: [title_style]
                              width: 500
                              long_mode: SCROLL_CIRCULAR
                    - obj:
                        width: 550
                        height: 380
                        styles: [card_style]
                        layout:
                          type: flex
                          flex_flow: column
                          flex_align_main: space_around
                          flex_align_cross: center
                        widgets:
                          - label:
                              text: "Battery Status"
                              styles: [label_style]
                          - label:
                              id: battery_label
                              text: "--- %"
                              styles: [value_style]

        # Volume overlay — floats over page content, hidden until encoder or HA changes volume.
        # mode: restart in the script ensures it auto-hides 2 s after the last step.
        - obj:
            id: volume_overlay
            hidden: true
            width: 680
            height: 70
            align: BOTTOM_MID
            y: -20
            bg_color: 0x1E1E1E
            bg_opa: 95%
            border_width: 1
            border_color: 0x333333
            radius: 12
            pad_left: 16
            pad_right: 16
            pad_top: 0
            pad_bottom: 0
            layout:
              type: flex
              flex_flow: row
              flex_align_cross: center
              flex_align_main: space_between
            widgets:
              - label:
                  text: "\U0001F50A"
                  text_font: icon_font_24
                  text_color: 0x00FF88
              - bar:
                  id: volume_bar
                  width: 490
                  height: 16
                  min_value: 0
                  max_value: 100
                  value: 50
                  indicator:
                    bg_color: 0x00FF88
                  bg_color: 0x333333
              - label:
                  id: volume_label
                  text: "50%"
                  text_font: roboto_font_24
                  text_color: 0xA0A0A0
                  width: 70
                  text_align: RIGHT
